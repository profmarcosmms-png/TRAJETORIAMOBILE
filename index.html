criptUrl: cfg.scriptUrl||this.defaultScriptUrl, turmaList: this.defaultTurmas, sendStatus:null, showConfig:false,\n      showNamePrompt: !(cfg.studentName && cfg.studentName.trim()), pendingPlay:null, nameError:null };\n    this.proj = null;\n    this.drag = null;\n    this.lastEntered = null;\n    this.cw = 800; this.ch = 500;\n  }\n\n  deg(d){ return d*Math.PI/180; }\n\n  // ---------- progression ----------\n  levelUnlocked(i){ if(i<=0) return true; if(this.state.solvedList.includes(this.levels[i].id)) return true; return this.state.solvedList.includes(this.levels[i-1].id); }\n  totalStars(){ return Object.values(this.state.stars).reduce((a,b)=>a+(b||0),0); }\n  maxStars(){ return this.levels.length*3; }\n\n  deg(d){ return d*Math.PI/180; }\n\n  // ---------- skins & achievements ----------\n  buildSkins(){\n    const has=(s,...ids)=>ids.every(i=>s.includes(i));\n    return [\n      {id:'classico',name:'Clássico', body:'#ff5436',belly:'#ffd1c2',brow:'#c8351c',beak:'#ffb02e', reqText:'Disponível desde o início', req:()=>true},\n      {id:'solar',   name:'Solar',    body:'#ffd23f',belly:'#fff0b8',brow:'#e0951a',beak:'#ff8a2e', reqText:'Acerte seu 1º alvo', req:(s)=>s.length>=1},\n      {id:'gelo',    name:'Gelo',     body:'#3bc4e0',belly:'#d4f4fb',brow:'#1f8fb0',beak:'#ffb02e', accessory:'ice', reqText:'Complete a Fase 1', req:(s)=>has(s,'1-1','1-2')},\n      {id:'floresta',name:'Floresta', body:'#5fcf6a',belly:'#d6f5da',brow:'#3a9e44',beak:'#ffb02e', accessory:'leaf', reqText:'Complete a Fase 2', req:(s)=>has(s,'2-1','2-2')},\n      {id:'aurora',  name:'Aurora',   body:'#ff8fb0',belly:'#ffe0ea',brow:'#e0567f',beak:'#ffb02e', accessory:'spark', reqText:'Complete a Fase 3', req:(s)=>has(s,'3-1','3-2')},\n      {id:'mestre',  name:'Mestre',   body:'#ffd76a',belly:'#fff3cf',brow:'#caa12e',beak:'#ff8a2e', accessory:'crown', reqText:'Acerte todos os 6 níveis', req:(s)=>s.length>=6}\n    ];\n  }\n  skinUnlocked(id,solved){ const sk=(this.skins||this.buildSkins()).find(s=>s.id===id); return sk?sk.req(solved):false; }\n  currentSkin(){ return this.skins.find(s=>s.id===this.state.skin) || this.skins[0]; }\n  diffCfg(){\n    const D={ facil:{tol:2.2, formula:true, readout:true, tick:true, label:'Fácil'},\n              medio:{tol:1, formula:true, readout:true, tick:false, label:'Médio'},\n              dificil:{tol:0.5, formula:false, readout:false, tick:false, label:'Difícil'} };\n    return D[this.state.difficulty]||D.medio;\n  }\n\n  descriptors(){\n    return {\n      DG1:{ code:'DG1', comp:'Interpretação geométrica', text:'Reconhecer ângulos complementares, suplementares e opostos pelo vértice em uma figura.' },\n      DG2:{ code:'DG2', comp:'Modelagem matemática', text:'Calcular a medida de um ângulo desconhecido a partir de relações angulares.' },\n      DG3:{ code:'DG3', comp:'Interpretação geométrica', text:'Identificar catetos, hipotenusa e projeções em um triângulo retângulo.' },\n      DG4:{ code:'DG4', comp:'Modelagem matemática', text:'Aplicar o Teorema de Pitágoras e as relações métricas para obter medidas.' },\n      DG5:{ code:'DG5', comp:'Interpretação geométrica', text:'Associar cada razão trigonométrica (sen, cos, tg) ao par de lados correto.' },\n      DG6:{ code:'DG6', comp:'Modelagem matemática', text:'Resolver problemas de altura e distância aplicando seno, cosseno e tangente.' },\n      DG7:{ code:'DG7', comp:'Modelagem matemática', text:'Aplicar a Lei dos Cossenos para resolver problemas em triângulos não retângulos.' },\n      DG8:{ code:'DG8', comp:'Interpretação geométrica', text:'Relacionar graus e radianos e localizar ângulos no ciclo trigonométrico.' },\n      DG9:{ code:'DG9', comp:'Modelagem matemática', text:'Modelar fenômenos periódicos com a função seno para prever valores no tempo.' }\n    };\n  }\n\n  buildLevels(){\n    const D=this.descriptors();\n    return [\n      // ===================== FASE 1 — ÂNGULOS =====================\n      { id:'1-1', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Ângulos Complementares', rank:1, biome:'campo', wind:0, desc:D.DG2,\n        prompt:'A rampa de apoio do canhão forma 35° com o solo. Ajuste o disparo ao ângulo COMPLEMENTAR para abrir o arco perfeito.',\n        given:[{label:'Ângulo da rampa',value:'35°'},{label:'Soma (complementares)',value:'90°'}],\n        formula:'α + β = 90°   →   β = 90° − 35°',\n        unit:'°', answer:55, tol:1, role:'angle', fireAngle:55,\n        dtype:'angles', diag:{ base:35, kind:'comp', sum:90 },\n        structXFrac:0.78, structHFrac:0.17, structKind:'blocks',\n        hint:'Complementares somam 90°. Subtraia o ângulo dado de 90° — não de 180°.',\n        bncc:'EF07MA23 · EM13MAT308 — ângulos e construção da mira' },\n\n      { id:'1-2', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Ângulos Suplementares', rank:1, biome:'campo', wind:0, desc:D.DG2,\n        prompt:'O braço do trabuco está a 130° com a linha do horizonte. Calcule o ângulo SUPLEMENTAR para liberar o projétil no arco de lançamento.',\n        given:[{label:'Ângulo do braço',value:'130°'},{label:'Soma (suplementares)',value:'180°'}],\n        formula:'α + β = 180°   →   β = 180° − 130°',\n        unit:'°', answer:50, tol:1, role:'angle', fireAngle:50,\n        dtype:'angles', diag:{ base:130, kind:'supp', sum:180 },\n        structXFrac:0.80, structHFrac:0.23, structKind:'blocks',\n        hint:'Suplementares somam 180°. Subtraia o ângulo dado de 180°.',\n        bncc:'EF07MA23 · EM13MAT308 — ângulos e construção da mira' },\n\n      { id:'1-3', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Opostos pelo Vértice', rank:2, biome:'deserto', wind:0.10, desc:D.DG1,\n        prompt:'No deserto, dois suportes se cruzam formando um ângulo de 63°. O ângulo OPOSTO PELO VÉRTICE, congruente a ele, aponta a direção do disparo. Qual é a sua medida?',\n        given:[{label:'Ângulo marcado',value:'63°'},{label:'Relação',value:'congruentes'},{label:'Vento',value:'→ leve'}],\n        formula:'opostos pelo vértice  →  β = α = 63°',\n        unit:'°', answer:63, tol:1, role:'angle', fireAngle:63,\n        dtype:'vert', diag:{ base:63 },\n        structXFrac:0.80, structHFrac:0.20, structKind:'blocks',\n        hint:'Ângulos opostos pelo vértice são SEMPRE congruentes (iguais). O valor procurado é o próprio ângulo dado.',\n        bncc:'EF07MA23 — ângulos opostos pelo vértice' },\n\n      { id:'1-4', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Soma dos Ângulos Internos', rank:3, biome:'deserto', wind:-0.14, desc:D.DG2,\n        prompt:'A estrutura é um triângulo cujos dois ângulos da base medem 50° e 60°. O ângulo do TOPO (onde está o alvo) é o terceiro. Calcule-o sabendo que os internos somam 180°.',\n        given:[{label:'Ângulo A',value:'50°'},{label:'Ângulo B',value:'60°'},{label:'Soma interna',value:'180°'},{label:'Vento',value:'← contra'}],\n        formula:'A + B + C = 180°  →  C = 180° − 50° − 60°',\n        unit:'°', answer:70, tol:1, role:'angle', fireAngle:70,\n        dtype:'trisum', diag:{ a:50, b:60, c:70 },\n        structXFrac:0.78, structHFrac:0.30, structKind:'triangle',\n        hint:'Os três ângulos internos de um triângulo somam 180°. Subtraia os dois ângulos dados de 180°.',\n        bncc:'EF07MA24 — soma dos ângulos internos do triângulo' },\n\n      { id:'1-5', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Complementares na Neve', rank:1, biome:'neve', wind:0.08, desc:D.DG2,\n        prompt:'No campo gelado, a base de gelo do estilingue inclina 28° com o solo. Ajuste o disparo ao ângulo COMPLEMENTAR para abrir o arco perfeito.',\n        given:[{label:'Ângulo da base',value:'28°'},{label:'Soma (complementares)',value:'90°'},{label:'Vento',value:'→ leve'}],\n        formula:'α + β = 90°   →   β = 90° − 28°',\n        unit:'°', answer:62, tol:1, role:'angle', fireAngle:62,\n        dtype:'angles', diag:{ base:28, kind:'comp', sum:90 },\n        structXFrac:0.80, structHFrac:0.18, structKind:'blocks',\n        hint:'Complementares somam 90°. Subtraia 28° de 90°, não de 180°.',\n        bncc:'EF07MA23 · EM13MAT308 — ângulos complementares' },\n\n      { id:'1-6', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Suplementares ao Crepúsculo', rank:2, biome:'crepusculo', wind:-0.10, desc:D.DG2,\n        prompt:'Ao entardecer, o galho de apoio forma 108° com a linha do horizonte. Calcule o ângulo SUPLEMENTAR para liberar o disparo no arco certo.',\n        given:[{label:'Ângulo do galho',value:'108°'},{label:'Soma (suplementares)',value:'180°'},{label:'Vento',value:'← contra'}],\n        formula:'α + β = 180°   →   β = 180° − 108°',\n        unit:'°', answer:72, tol:1, role:'angle', fireAngle:72,\n        dtype:'angles', diag:{ base:108, kind:'supp', sum:180 },\n        structXFrac:0.80, structHFrac:0.22, structKind:'blocks',\n        hint:'Suplementares somam 180°. Subtraia 108° de 180°.',\n        bncc:'EF07MA23 · EM13MAT308 — ângulos suplementares' },\n\n      { id:'1-7', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Opostos pelo Vértice — Noite', rank:2, biome:'noite', wind:0.12, desc:D.DG1,\n        prompt:'Sob a lua, dois suportes de pedra se cruzam formando 54°. O ângulo OPOSTO PELO VÉRTICE, congruente a ele, aponta a direção do disparo. Qual é a sua medida?',\n        given:[{label:'Ângulo marcado',value:'54°'},{label:'Relação',value:'congruentes'},{label:'Vento',value:'→ leve'}],\n        formula:'opostos pelo vértice  →  β = α = 54°',\n        unit:'°', answer:54, tol:1, role:'angle', fireAngle:54,\n        dtype:'vert', diag:{ base:54 },\n        structXFrac:0.80, structHFrac:0.20, structKind:'blocks',\n        hint:'Ângulos opostos pelo vértice são sempre congruentes: a resposta é o próprio 54°.',\n        bncc:'EF07MA23 — ângulos opostos pelo vértice' },\n\n      { id:'1-8', phase:1, phaseLabel:'FASE 01 · ÂNGULOS', title:'Ângulos Internos — Campo', rank:3, biome:'campo', wind:0, desc:D.DG2,\n        prompt:'A estrutura é um triângulo cujos ângulos da base medem 72° e 43°. O ângulo do TOPO (onde está o alvo) é o terceiro. Calcule-o sabendo que os internos somam 180°.',\n        given:[{label:'Ângulo A',value:'72°'},{label:'Ângulo B',value:'43°'},{label:'Soma interna',value:'180°'}],\n        formula:'A + B + C = 180°  →  C = 180° − 72° − 43°',\n        unit:'°', answer:65, tol:1, role:'angle', fireAngle:65,\n        dtype:'trisum', diag:{ a:72, b:43, c:65 },\n        structXFrac:0.78, structHFrac:0.30, structKind:'triangle',\n        hint:'Os três ângulos internos somam 180°. Subtraia 72° e 43° de 180°.',\n        bncc:'EF07MA24 — soma dos ângulos internos do triângulo' },\n\n      // ===================== FASE 2 — RELAÇÕES MÉTRICAS =====================\n      { id:'2-1', phase:2, phaseLabel:'FASE 02 · RELAÇÕES MÉTRICAS', title:'Teorema de Pitágoras', rank:2, biome:'campo', wind:0, desc:D.DG4,\n        prompt:'Os catetos da estrutura medem 80 m e 60 m. A distância em linha reta até o topo (a hipotenusa) calibra a força do disparo. Calcule-a.',\n        given:[{label:'Cateto b',value:'80 m'},{label:'Cateto c',value:'60 m'}],\n        formula:'a² = b² + c²   →   a = √(80² + 60²)',\n        unit:'m', answer:100, tol:2, role:'length', fireAngle:52,\n        dtype:'pitag', diag:{ b:80, c:60, a:100 },\n        structXFrac:0.80, structHFrac:0.30, structKind:'blocks',\n        hint:'Some os QUADRADOS dos catetos e extraia a raiz: √(6400 + 3600) = √10000.',\n        bncc:'EF09MA14 — Teorema de Pitágoras / relações métricas' },\n\n      { id:'2-2', phase:2, phaseLabel:'FASE 02 · RELAÇÕES MÉTRICAS', title:'Altura Relativa à Hipotenusa', rank:3, biome:'neve', wind:0.12, desc:D.DG4,\n        prompt:'Na montanha gelada, o ponto fraco da estrutura triangular fica na ALTURA relativa à hipotenusa. Com as projeções dos catetos m = 16 e n = 9, calcule a altura h do impacto.',\n        given:[{label:'Projeção m',value:'16'},{label:'Projeção n',value:'9'},{label:'Hipotenusa a',value:'25'},{label:'Vento',value:'→ leve'}],\n        formula:'h² = m · n   →   h = √(16 · 9)',\n        unit:'m', answer:12, :'Ângulo θ',value:'60°'},{label:'cos 60°',value:'0,5'}],\n        formula:'cos θ = adj / hip   →   adj = 80 · cos 60°',\n        unit:'m', answer:40, tol:1.5, role:'length', fireAngle:55,\n        dtype:'trig', diag:{ hip:80, theta:60, find:'adj', adj:40, opp:69 },\n        structXFrac:0.82, structHFrac:0.22, structKind:'blocks',\n        hint:'O cateto ADJACENTE usa COSSENO: adj = hip · cos θ. Aqui cos 60° = 0,5.',\n        bncc:'EM13MAT308 — razões trigonométricas (cosseno)' },\n\n      { id:'3-2', phase:3, phaseLabel:'FASE 03 · TRIGONOMETRIA', title:'Seno — Cateto Oposto', rank:3, biome:'noite', wind:0.14, desc:D.DG6,\n        prompt:'Sob a lua, a torre inimiga: você conhece a hipotenusa = 60 m e o ângulo de lançamento θ = 30°. Calcule a ALTURA do alvo (cateto oposto).',\n        given:[{label:'Hipotenusa',value:'60 m'},{label:'Ângulo θ',value:'30°'},{label:'sin 30°',value:'0,5'},{label:'Vento',value:'→ leve'}],\n        formula:'sin θ = op / hip   →   op = 60 · sin 30°',\n        unit:'m', answer:30, tol:1.5, role:'length', fireAngle:58,\n        dtype:'trig', diag:{ hip:60, theta:30, find:'opp', adj:52, opp:30 },\n        structXFrac:0.80, structHFrac:0.40, structKind:'blocks',\n        hint:'O cateto OPOSTO usa SENO: op = hip · sin θ. Aqui sin 30° = 0,5.',\n        bncc:'EM13MAT308 — razões trigonométricas (seno)' },\n\n      { id:'3-3', phase:3, phaseLabel:'FASE 03 · TRIGONOMETRIA', title:'Tangente — Altura pela Base', rank:4, biome:'noite', wind:-0.18, desc:D.DG5,\n        prompt:'Você mede a distância no solo até a base (adjacente = 50 m) e o ângulo de elevação θ = 37°. Use a TANGENTE para descobrir a altura do alvo.',\n        given:[{label:'Adjacente (solo)',value:'50 m'},{label:'Ângulo θ',value:'37°'},{label:'tg 37°',value:'0,75'},{label:'Vento',value:'← contra'}],\n        formula:'tg θ = op / adj   →   op = 50 · tg 37°',\n        unit:'m', answer:38, tol:2, role:'length', fireAngle:56,\n        dtype:'trig', diag:{ hip:63, theta:37, find:'opp', adj:50, )',\n        unit:'m', answer:70, tol:2, role:'length', fireAngle:52,\n        dtype:'coslaw', diag:{ b:80, c:50, A:60, a:70 },\n        structXFrac:0.82, structHFrac:0.30, structKind:'blocks',\n        hint:'Lei dos cossenos: a² = b² + c² − 2bc·cos Â = 6400 + 2500 − 4000 = 4900. Então a = √4900 = 70.',\n        bncc:'EM13MAT308 — Lei dos Cossenos (triângulo qualquer)' },\n\n      { id:'4-3', phase:4, phaseLabel:'FASE 04 · TRIG. AVANÇADA', title:'Alvo Periódico — Função Seno', rank:5, biome:'noite', wind:0, desc:D.DG9, periodic:true,\n        prompt:'Um drone oscila como uma ONDA: h(θ) = 20·sen(θ) + 40 (em metros). No instante da mira, θ = 30°. Calcule a ALTURA h do drone para acertá-lo em pleno voo.',\n        given:[{label:'Amplitude A',value:'20'},{label:'Deslocamento k',value:'40'},{label:'Fase θ',value:'30°'},{label:'sen 30°',value:'0,5'}],\n        formula:'h = A·sen θ + k   →   20·sen 30° + 40',\n        unit:'m', answer:50, tol:2, role:'length', fireAngle:56,\n        dtype:'sine', diag:{ A:20, k:40, theta:30, h:50 },\n        structXFrac:0.82, structHFrac:0.42, structKind:'blocks',\n        hint:'Primeiro o seno: 20·sen 30° = 20·0,5 = 10. Depois some o deslocamento k: 10 + 40 = 50 m.',\n        bncc:'EM13MAT306 — funções periódicas (seno)' },\n\n      { id:'4-4', phase:4, phaseLabel:'FASE 04 · TRIG. AVANÇADA', title:'Radianos — π/4', rank:3, biome:'crepusculo', wind:0, desc:D.DG8,\n        prompt:'O canhão gira em RADIANOS. Converta o ângulo θ = π/4 rad para GRAUS e ajuste a mira à rampa.',\n        given:[{label:'Ângulo θ',value:'π/4 rad'},{label:'Meia-volta',value:'π rad = 180°'}],\n        formula:'graus = rad · 180/π   →   (π/4) · 180/π',\n        unit:'°', answer:45, tol:1, role:'angle', fireAngle:45,\n        dtype:'radians', diag:{ radLabel:'π/4', deg:45 },\n        structXFrac:0.80, structHFrac:0.22, structKind:'blocks',\n        hint:'π rad = 180°. Logo π/4 = 180° ÷ 4 = 45°.',\n        bncc:'EM13MAT404 — radianos e ciclo trigonométrico' },\n\n      { id:'4-5', phase:4, phaseLabel:'FASE 04 · TRIG. AVANÇADA', title:'Radianos — π/6', rank:3, biome:'campo', wind:0, desc:D.DG8,\n        prompt:'Converta o ângulo θ = π/6 rad para GRAUS e ajuste a mira à rampa do estilingue.',\n        given:[{label:'Ângulo θ',value:'π/6 rad'},{label:'Meia-volta',value:'π rad = 180°'}],\n        formula:'graus = rad · 180/π   →   (π/6) · 180/π',\n        unit:'°', answer:30, tol:1, role:'angle', fireAngle:34,\n        dtype:'radians', diag:{ radLabel:'π/6', deg:30 },\n        structXFrac:0.78, structHFrac:0.18, structKind:'blocks',\n        hint:'π rad = 180°. Logo π/6 = 180° ÷ 6 = 30°.',\n        bncc:'EM13MAT404 — radianos e ciclo trigonométrico' },\n\n      { id:'4-6', phase:4, phaseLabel:'FASE 04 · TRIG. AVANÇADA', title:'Lei dos Cossenos — Ângulo Obtuso', rank:5, biome:'deserto', wind:0.14, desc:D.DG7,\n        prompt:'O alvo está atrás de uma duna: o triângulo NÃO é retângulo. Os lados conhecidos medem 30 m e 50 m e o ângulo entre eles é 120° (cos 120° = −0,5). Calcule a distância direta a até o alvo.',\n        given:[{label:'Lado b',value:'30 m'},{label:'Lado c',value:'50 m'},{label:'Ângulo Â',value:'120°'},{label:'cos 120°',value:'−0,5'},{label:'Vento',value:'→ leve'}],\n        formula:'a² = b² + c² − 2·b·c·cos Â   →   √(30²+50²−2·30·50·(−0,5))',\n        unit:'m', answer:70, tol:2, role:'length', fireAngle:52,\n        dtype:'coslaw', diag:{ b:30, c:50, A:120, a:70 },\n        structXFrac:0.82, structHFrac:0.30, structKind:'blocks',\n        hint:'a² = 900 + 2500 − 2·30·50·(−0,5) = 3400 + 1500 = 4900. Então a = √4900 = 70.',\n        bncc:'EM13MAT308 — Lei dos Cossenos (ângulo obtuso)' },\n\n      { id:'4-7', phase:4, phaseLabel:'FASE 04 · TRIG. AVANÇADA', title:'Alvo Periódico — Onda Alta', rank:5, biome:'noite', wind:0.18, desc:D.DG9, periodic:true,\n        prompt:'Um drone oscila como uma ONDA: h(θ) = 30·sen(θ) + 50 (em metros). No instante da mira, θ = 30° (sen 30° = 0,5). Calcule a ALTURA h do drone para acertá-lo em pleno voo.',\n        given:[{label:'Amplitude A',value:'30'},{label:'Deslocamento k',value:'50'},{label:'Fase θ',value:'30°'},{label:'sen 30°',value:'0,5'},{label:'Vento',value:'→ médio'}],\n        formula:'h = A·sen θ + k   →   30·sen 30° + 50',\n        unit:'m', answer:65, tol:2, role:'length', fireAngle:58,\n        dtype:'sine', diag:{ A:30, k:50, theta:30, h:65 },\n        structXFrac:0.84, structHFrac:0.44, structKind:'blocks',\n        hint:'Primeiro o seno: 30·0,5 = 15. Depois some k: 15 + 50 = 65 m.',\n        bncc:'EM13MAT306 — funções periódicas (seno)' }\n    ];\n  }\n\n  // ---------- scene & physics ----------\n  scene(W,H,lv){\n    const groundY = H*0.80;\n    const muzzle = { x:W*0.16, y:groundY - H*0.135 };   // = sling pouch / launch origin\n    const structX = W*lv.structXFrac;\n    const structHpx = H*lv.structHFrac;\n    const target = { x:structX, y:groundY - structHpx - H*0.035 };\n    return { groundY, muzzle, target, structX, structHpx, hitR:H*0.058 };\n  }\n  slingAnchor(){ const s=this.scene(this.cw,this.ch,this.levels[this.state.levelIndex]); return { x:s.muzzle.x, y:s.muzzle.y }; }\n  maxPull(){ return this.ch*0.17; }\n  updateDrag(p){\n    const a=this.slingAnchor(); const maxR=this.maxPull();\n    let dx=p.x-a.x, dy=p.y-a.y; const d=Math.hypot(dx,dy);\n    if(d>maxR){ dx*=maxR/d; dy*=maxR/d; }\n    this.drag.x=a.x+dx; this.drag.y=a.y+dy; this.drag.pull=Math.min(d,maxR)/maxR;\n    this.draw();\n  }\n  dragLaunch(){\n    const a=this.slingAnchor(); const hx=this.drag.x, hy=this.drag.y;\n    const lvx=Math.abs(a.x-hx)||0.0001, lvy=a.y-hy;     // launch vector (always rightward)\n    let deg=Math.atan2(lvy, lvx)*180/Math.PI; deg=Math.max(5,Math.min(88,deg));\n    const pull=this.drag.pull||0;\n    const lv=this.levels[this.state.levelIndex];\n    let value;\n    if(lv.role==='angle'){ value=Math.round(deg); }\n    else { const scale=lv.answer/0.72; value=Math.round(pull*scale); }\n    return { deg, rad:this.deg(deg), pull, value };\n  }\n  releaseDrag(){\n    const pull=this.drag.pull||0;\n    if(pull<0.14){ this.drag=null; this.draw(); return; }   // too soft, just reset\n    if((this.state.dragsUsed||0)>=3){ this.drag=null; this.setState({ feedback:{ kind:'warn', title:'Lançamentos esgotados', msg:'Você já usou os 3 puxões de mira. Agora resolva o cálculo e digite o valor no campo “SUA RESPOSTA” para disparar.' }, status:'aiming' }); return; }\n    const dl=this.dragLaunch();\n    this.drag=null;\n    this.setState(s=>({ dragsUsed:(s.dragsUsed||0)+1 }));\n    this.fireWith(dl.value, dl.rad, dl.pull);\n  }\n  windAccel(lv,H){ return (lv.wind||0)*H*1.15; }   // horizontal acceleration (px/s²)\n  shot(W,H,lv){\n    const s = this.scene(W,H,lv);\n    const theta = this.deg(lv.fireAngle);\n    const g = H*2.4;\n    const ax = this.windAccel(lv,H);\n    const tgt = s.target, x0=s.muzzle.x, y0=s.muzzle.y;\n    // binary-search launch speed so the (wind-affected) trajectory threads the target\n    const yAt=(v)=>{ let x=x0,y=y0,vx=v*Math.cos(theta),vy=-v*Math.sin(theta); const dt=0.008;\n      for(let i=0;i<2400;i++){ vx+=ax*dt; vy+=g*dt; x+=vx*dt; y+=vy*dt; if(x>=tgt.x) return y; if(y>s.groundY+H*1.5) return 1e9; }\n      return 1e9; };\n    let lo=H*0.6, hi=H*7, v=H*2.5;\n    for(let i=0;i<44;i++){ v=(lo+hi)/2; const yc=yAt(v); if(yc>tgt.y) lo=v; else hi=v; }\n    return { s, theta, v, g, ax };\n  }\n\n  fire(){   // typed-input fallback\n    const entered = parseFloat((this.state.answer||'').replace(',','.'));\n    if(!isFinite(entered)){ this.setState({ feedback:{ kind:'warn', title:'Sem valor', msg:'Digite sua resposta ou estique o estilingue para mirar.' }, status:'aiming' }); return; }\n    this.commitShot(entered, {});\n  }\n  fireWith(value, dragRad, pull){ this.setState({ answer:String(value) }); this.commitShot(value, { dragRad, pull }); }\n\n  commitShot(entered, opt){\n    if(this.state.status==='firing') return;\n    const lv = this.levels[this.state.levelIndex];\n    this.lastEntered = entered;\n    const tolMult = this.diffCfg().tol;\n    const isCorrect = Math.abs(entered - lv.answer) <= lv.tol*tolMult;\n    const sh = this.shot(this.cw, this.ch, lv);\n    let theta = sh.theta, v = sh.v;\n    if(!isCorrect){\n      if(lv.role==='angle'){\n        theta = (opt.dragRad!=null) ? opt.dragRad : this.deg(Math.max(8, Math.min(86, entered)));\n        v = sh.v;\n      } else {\n        if(opt.pull!=null){ const Vmax=sh.v/0.72; v=Math.max(sh.v*0.32, opt.pull*Vmax); theta=sh.theta; }\n        else { let r=entered/lv.answer; r=Math.max(0.18,Math.min(2.6,r)); v=sh.v*Math.sqrt(r); }\n      }\n    }\n    this.proj = {\n      firing:true, x:sh.s.muzzle.x, y:sh.s.muzzle.y,\n      vx:v*Math.cos(theta), vy:-v*Math.sin(theta), g:sh.g, ax:sh.ax,\n      trail:[], isCorrect, target:sh.s.target, hitR:sh.s.hitR, groundY:sh.s.groundY, theta, spin:0\n    };\n    this.setState({ status:'firing', feedback:null, attempts:(this.state.attempts||0)+1 });\n  }\n\n  onResult(hit){\n    const lv = this.levels[this.state.levelIndex];\n    if(hit){\n      const had = this.state.solvedList.slice();\n      const solved = had.includes(lv.id) ? had : [...had, lv.id];\n      const att = this.state.attempts||1;\n      const earned = att<=1?3 : att===2?2 : 1;\n      const prevStars = this.state.stars[lv.id]||0;\n      const stars = { ...this.state.stars, [lv.id]: Math.max(prevStars, earned) };\n      // combo: consecutive first-try hits\n      const combo = att<=1 ? (this.state.combo||0)+1 : 0;\n      // points: base by rank + star bonus + combo + difficulty multiplier\n      const diffMult = ({facil:1, medio:1.5, dificil:2.2})[this.state.difficulty]||1.5;\n      const base = 100*(lv.rank||1) + earned*60 + combo*40;\n      const gain = Math.round(base*diffMult);\n      const points = this.state.points + gain;\n      // newly unlocked skin\n      let newSkin=null;\n      for(const sk of this.skins){ if(sk.id!=='classico' && !sk.req(had) && sk.req(solved)){ newSkin=sk; break; } }\n      this.setState({ status:'hit', feedback:{ kind:'success', title: earned===3?'Perfeito! 3 estrelas ⭐⭐⭐':'Alvo destruído!', msg: earned===3?'Acertou de primeira — cálculo impecável.':'Cálculo correto. Acerte de primeira para 3 estrelas.' }, solvedList:solved, stars, points, combo, lastGain:gain, justUnlocked:newSkin });\n      this.save(solved, this.state.levelIndex, stars, points);\n      // envia o resultado para o ranking automaticamente (silencioso) — usa o maior placar\n      setTimeout(()=>{ try{ this.autoSend(); }catch(e){} }, 50);\n      if(newSkin){ clearTimeout(this._unlockT); this._unlockT=setTimeout(()=>this.setState({justUnlocked:null}), 4200); }\n    } else {\n      this.setState({ status:'miss', combo:0, feedback:this.makeFeedback(lv, this.lastEntered) });\n    }\n  }\n\n  makeFeedback(lv, entered){\n    return { kind:'error', title:'Quase lá — recalcule', msg: lv.hint };\n  }\n\n  save(solved, level, stars, points){ try{ localStorage.setItem('trajetoria_v1', JSON.stringify({ solved, level, difficulty:this.state.difficulty, skin:this.state.skin, stars: stars||this.state.stars, points: points!=null?points:this.state.points })); }catch(e){} }\n  setDifficulty(d){ this.setState({difficulty:d}, ()=>this.save(this.state.solvedList, this.state.levelIndex)); }\n  selectSkin(id){ if(!this.skinUnlocked(id,this.state.solvedList)) return; this.setState({skin:id}, ()=>this.save(this.state.solvedList, this.state.levelIndex)); }\n  resetProgress(){ try{ localStorage.removeItem('trajetoria_v1'); }catch(e){} this.proj=null; this.setState({ solvedList:[], stars:{}, points:0, combo:0, attempts:0, levelIndex:0, skin:'classico', justUnlocked:null }); }\n\n  saveCfg(){ try{ localStorage.setItem('trajetoria_cfg', JSON.stringify({ studentName:this.state.studentName, turma:this.state.turma, scriptUrl:this.state.scriptUrl, turmaList:this.state.turmaList })); }catch(e){} }\n\n  nameValid(n){ const p=(n||'').trim().split(/\\s+/).filter(w=>w.length>=2); return p.length>=2; }\n  contin ter') this.commitName(); },\n      onLevels: ()=> { this.proj=null; this.setState({ screen:'levels', status:'aiming', feedback:null }); },\n      onGuide: ()=> this.setState({ screen:'guide' }),\n      onResetProgress: ()=> { if(typeof window!=='undefined' && window.confirm && !window.confirm('Reiniciar todo o progresso (estrelas, pontos e fases)?')) return; this.resetProgress(); },\n      onMenu: ()=> { this.proj=null; this.setState({ screen:'menu', status:'aiming', feedback:null }); },\n      onAnswerInput: (e)=> this.setState({ answer: e.target.value, feedback: this.state.status==='miss'?this.state.feedback:null, status: this.state.status==='hit'?'hit':'aiming' }),\n      onKey: (e)=> { if(e.key==='Enter'){ if(this.state.status==='hit') this.onNextLevel(); else this.fire(); } },\n      onFire: ()=> this.fire(),\n      onReset: ()=> this.reset(),\n      onNext: ()=> this.onNextLevel()\n    };\n  }\n\n  onNextLevel(){\n    if(this.state.levelIndex >= this.levels.length-1){ this.proj=null; this.setState({ screen:'levels', status:'aiming', feedback:null }); }\n    else this.goLevel(this.state.levelIndex+1);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

<div id="mb-portrait" aria-hidden="true" style="
  display:none;position:fixed;inset:0;z-index:99999;
  background:#0e2438;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;text-align:center;padding:24px;
  font-family:'Space Grotesk',sans-serif;">
  <div id="mb-p-icon" style="font-size:56px">&#128241;</div>
  <h2 style="font-size:22px;font-weight:700;color:#fff;margin:0">Gire o celular!</h2>
  <p style="font-size:14px;color:#9fc0da;max-width:240px;line-height:1.5;margin:0">
    <strong>Trajetória</strong> usa a tela na <strong>horizontal</strong>.<br>
    Vire o dispositivo para continuar.
  </p>
</div>

<!-- ── SINGLE-ROW NUMPAD ─────────────────────────────── -->
<!--
  Layout (13 teclas em 1 linha):
  [1][2][3][4][5][6][7][8][9][0][.][⌫][LIMPAR]
  Fica preso no fundo da área do canvas (position:absolute).
  Visível apenas quando body.mb-on
-->
<div id="mb-numpad" role="group" aria-label="Teclado numérico" style="
  display:none;
  position:fixed;bottom:0;left:0;
  width:60%;          /* cobre só a metade do canvas */
  height:48px;
  background:#0b1a2a;
  border-top:2px solid #2b4a6b;
  border-right:1px solid #1d3a57;
  border-radius:0 8px 0 0;
  z-index:8000;
  flex-direction:row;
  align-items:stretch;">
  <button class="mb-k" data-k="1">1</button>
  <button class="mb-k" data-k="2">2</button>
  <button class="mb-k" data-k="3">3</button>
  <button class="mb-k" data-k="4">4</button>
  <button class="mb-k" data-k="5">5</button>
  <button class="mb-k" data-k="6">6</button>
  <button class="mb-k" data-k="7">7</button>
  <button class="mb-k" data-k="8">8</button>
  <button class="mb-k" data-k="9">9</button>
  <button class="mb-k" data-k="0">0</button>
  <button class="mb-k mb-dot" data-k=".">.</button>
  <button class="mb-k mb-bs" data-k="bs">&#9003;</button>
  <button class="mb-k mb-clr" data-k="clr">LIMPAR</button>
</div>

<style>
/* ── Portrait icon spin ── */
@keyframes mb-spin{from{transform:rotate(0)}to{transform:rotate(90deg)}}
#mb-p-icon{animation:mb-spin 1.8s ease-in-out infinite alternate;}
@media(orientation:portrait)and(max-width:900px){#mb-portrait{display:flex!important;}}

/* ── Numpad keys ── */
.mb-k{
  flex:1;border:none;border-right:1px solid #1d3a57;
  background:#10293f;color:#eaf4fd;
  font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
  font-family:'Fredoka',sans-serif;
  transition:background .08s;
}
.mb-k:last-child{border-right:none;}
.mb-k:active,.mb-k.mb-press{background:#1e3d5c!important;}
.mb-dot{color:#7fe3ee;font-size:20px;}
.mb-bs{background:#15304b!important;color:#ff8a63;font-size:17px;flex:1.1;}
.mb-clr{background:#15304b!important;color:#9fc0da;font-size:12px;
  letter-spacing:.04em;font-weight:700;flex:1.5;border-right:none;}

/* ── Active-mode overrides ── */
body.mb-on #mb-numpad{display:flex!important;}

/* Hide floating canvas hint */
body.mb-on [data-mb-hint]{display:none!important;}

/* Compact top-bar */
body.mb-on [data-mb-topbar]{
  height:40px!important;padding:0 8px!important;gap:6px!important;}
body.mb-on [data-mb-topbar] [data-mb-twitter]{display:none!important;}

/* Aside: scrollable, pin input at bottom */
body.mb-on aside{
  display:flex!important;flex-direction:column!important;
  overflow:hidden!important;}
body.mb-on [data-mb-aside-scroll]{
  flex:1!important;overflow-y:auto!important;overflow-x:hidden!important;
  padding:10px 14px 4px!important;
  -webkit-overflow-scrolling:touch!important;}
body.mb-on [data-mb-aside-input]{
  flex:none!important;padding:8px 12px 10px!important;
  border-top:2px solid #1d3a57!important;
  background:#0e2438!important;}

/* Canvas area: reserve bottom strip for numpad */
body.mb-on [data-mb-canvas-col]{padding-bottom:48px!important;}
</style>

<script>
/* ════════════════════════════════════════════════════════
   TRAJETÓRIA MOBILE ADAPTER  –  Self-contained IIFE
   No external deps | Web Audio API sounds | Polling loop
   ════════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ── 1. AUDIO ENGINE ──────────────────────────────────── */
var _ac = null;
function ac(){
  if(!_ac) try{ _ac=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  if(_ac&&_ac.state==='suspended') _ac.resume();
  return _ac;
}
function tone(freq,dur,type,vol,t0){
  var a=ac(); if(!a) return;
  try{
    var o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    var t=(t0||0)+a.currentTime;
    g.gain.setValueAtTime(vol||0.25,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
function noise(dur,vol,t0){
  var a=ac(); if(!a) return;
  try{
    var buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(vol||0.15);
    var s=a.createBufferSource(), g=a.createGain();
    s.buffer=buf; s.connect(g); g.connect(a.destination);
    var t=(t0||0)+a.currentTime;
    g.gain.setValueAtTime(vol||0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.start(t);
  }catch(e){}
}

var SFX={
  tap:   function(){ tone(500,0.05,'square',0.08); },
  numpad:function(){ tone(660,0.04,'square',0.07); },
  launch:function(){
    var a=ac(); if(!a) return;
    try{
      var o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.type='sawtooth';
      o.frequency.setValueAtTime(900,a.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,a.currentTime+0.32);
      g.gain.setValueAtTime(0.25,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.35);
      o.start(a.currentTime); o.stop(a.currentTime+0.38);
    }catch(e){}
  },
  hit:function(){
    // boom + sparkle + crowd noise
    tone(110,0.35,'sine',0.45);
    [880,1100,1400,1760].forEach(function(f,i){ tone(f,0.14,'sine',0.14,i*0.05); });
    noise(0.4,0.18,0.05);
  },
  miss:function(){
    [330,280,240,195].forEach(function(f,i){ tone(f,0.2,'sawtooth',0.2,i*0.11); });
  },
  star:function(){
    [523,659,784,1047].forEach(function(f,i){ tone(f,0.13,'sine',0.22,i*0.08); });
  },
  unlock:function(){
    [523,659,784,1047,1319,1568].forEach(function(f,i){ tone(f,0.17,'sine',0.24,i*0.09); });
  }
};

// Unlock AudioContext on first gesture
['touchstart','mousedown'].forEach(function(ev){
  document.addEventListener(ev,function u(){ ac(); document.removeEventListener(ev,u); },{once:true,passive:true});
});

/* ── 2. ORIENTATION / PORTRAIT BLOCKER ───────────────── */
function checkOrientation(){
  var bl=document.getElementById('mb-portrait'); if(!bl) return;
  var mob=window.innerWidth<1100;
  bl.style.display=(mob&&window.innerHeight>window.innerWidth)?'flex':'none';
}
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',function(){setTimeout(checkOrientation,250);});
setTimeout(checkOrientation,500);

/* ── 3. MOBILE LANDSCAPE DETECTION ───────────────────── */
function isMobLand(){
  return window.innerWidth<1250 && window.innerHeight<680 && window.innerWidth>window.innerHeight;
}

/* ── 4. GAME ELEMENT HELPERS ──────────────────────────── */
function realInput(){ return document.querySelector('input[inputmode="decimal"]'); }
function fireBtn(){
  var bb=document.querySelectorAll('button');
  for(var i=0;i<bb.length;i++){
    if((bb[i].style.background||'').indexOf('ff6a3d')>-1&&!bb[i].id) return bb[i];
  }
  return null;
}
function nextBtn(){
  var bb=document.querySelectorAll('button');
  for(var i=0;i<bb.length;i++){
    if((bb[i].style.background||'').indexOf('46c66d')>-1) return bb[i];
  }
  return null;
}

/* ── 5. DOM TAGGING ───────────────────────────────────── */
// We tag elements once per game-screen entry so CSS can target them.
var tagged=false;
function tagDOM(){
  if(tagged) return;
  var cv=document.getElementById('traj-canvas'); if(!cv) return;

  /* canvas column (flex item containing canvas + hint) */
  var col=cv.closest('div[style*="flex:1;position:relative"]');
  if(col) col.setAttribute('data-mb-canvas-col','');

  /* floating hint */
  document.querySelectorAll('[style*="left:18px"][style*="bottom:16px"]').forEach(function(el){
    el.setAttribute('data-mb-hint','');
  });

  /* top bar */
  document.querySelectorAll('[style*="height:58px"][style*="background:#0b1a2a"]').forEach(function(el){
    el.setAttribute('data-mb-topbar','');
    // tag twitter/bird icon
    el.querySelectorAll('span').forEach(function(sp){
      if(sp.textContent.indexOf('\uD83D\uDC26')>-1) sp.setAttribute('data-mb-twitter','');
    });
  });

  /* aside scroll zone & input zone */
  var inp=realInput();
  if(inp){
    /* walk up to find "SUA RESPOSTA" container and its parent */
    var node=inp;
    while(node && node.tagName!=='ASIDE'){
      var prev=node.previousElementSibling;
      if(prev && prev.textContent && prev.textContent.trim()==='SUA RESPOSTA'){
        // node is the flex row with input+button
        var section=node.parentElement; // div wrapping label+row
        if(section){
          section.setAttribute('data-mb-aside-input','');
          /* everything before this section = scroll zone */
          var aside=section.parentElement;
          if(aside && aside.tagName==='DIV'){
            var before=document.createElement('div');
            before.setAttribute('data-mb-aside-scroll','');
            before.style.cssText='display:contents';
            /* wrap all siblings before section */
            var kids=Array.from(aside.children);
            var wrap=document.createElement('div');
            wrap.setAttribute('data-mb-aside-scroll','');
            kids.forEach(function(k){
              if(k!==section) wrap.appendChild(k);
            });
            aside.insertBefore(wrap,section);
          }
        }
        break;
      }
      node=node.parentElement;
    }
  }

  tagged=true;
}

/* ── 6. NUMPAD ────────────────────────────────────────── */
function setVal(v){
  var inp=realInput(); if(!inp) return;
  var setter=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value');
  setter.set.call(inp,v);
  inp.dispatchEvent(new Event('input',{bubbles:true}));
}
function handleKey(k){
  SFX.numpad();
  var cur=(realInput()||{value:''}).value;
  if(k==='clr'){ setVal(''); }
  else if(k==='bs'){ setVal(cur.slice(0,-1)); }
  else if(k==='.'){ if(cur.indexOf('.')===-1) setVal(cur+'.'); }
  else { if(cur.replace('-','').replace('.','').length<6) setVal(cur+k); }
}

var numpad=document.getElementById('mb-numpad');
numpad.querySelectorAll('.mb-k').forEach(function(btn){
  btn.addEventListener('touchstart',function(e){
    e.preventDefault();
    btn.classList.add('mb-press');
    handleKey(btn.dataset.k);
  },{passive:false});
  btn.addEventListener('touchend',function(){ btn.classList.remove('mb-press'); });
  btn.addEventListener('click',function(){ handleKey(btn.dataset.k); });
});

/* Enter on native keyboard also fires */
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var nb=nextBtn(); if(nb){ nb.click(); return; }
    var fb=fireBtn(); if(fb&&!fb.disabled) fb.click();
  }
});

/* ── 7. SOUND HOOKS ──────────────────────────────────── */
var hookedFire=null, hookedBtns=new WeakSet(), lastFbSig='';

function hookGameSounds(){
  /* fire button */
  var fb=fireBtn();
  if(fb && fb!==hookedFire){
    hookedFire=fb;
    fb.addEventListener('click',function(){ if(!fb.disabled) SFX.launch(); });
  }
  /* all other buttons */
  document.querySelectorAll('button').forEach(function(b){
    if(!hookedBtns.has(b)){
      hookedBtns.add(b);
      b.addEventListener('click',function(){ SFX.tap(); });
    }
  });
  /* feedback observation */
  var fbEl=document.querySelector('[style*="fbBg"]')||
           document.querySelector('[data-dc-bind*="fbTitle"]');
  // Instead detect via text content of feedback divs
  var allBig=document.querySelectorAll('[style*="font-size:64px"],[style*="font-size:46px"]');
  allBig.forEach(function(el){
    var txt=el.textContent||'';
    if(txt===lastFbSig) return;
    lastFbSig=txt;
    if(txt.indexOf('ACERTOU')>-1||txt.indexOf('Parab')>-1) SFX.hit();
    else if(txt.indexOf('errou')>-1||txt.indexOf('Ops')>-1) SFX.miss();
    else if(txt.indexOf('Skin')>-1||txt.indexOf('desbloq')>-1) SFX.unlock();
  });
}

/* ── 8. MAIN POLLING LOOP ────────────────────────────── */
var wasGame=false;
function tick(){
  var inGame=!!document.getElementById('traj-canvas');
  var mob=isMobLand();

  if(inGame && mob){
    if(!document.body.classList.contains('mb-on')){
      document.body.classList.add('mb-on');
    }
    if(!wasGame){ tagged=false; setTimeout(tagDOM,350); }
    wasGame=true;
    hookGameSounds();
  } else {
    document.body.classList.remove('mb-on');
    wasGame=false;
  }
}
setInterval(tick,200);
window.addEventListener('resize',function(){setTimeout(tick,120);setTimeout(checkOrientation,180);});

})(); /* end IIFE */
</script>

<!-- end mobile adapter -->

</body>
</html>
