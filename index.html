document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 60px;display:flex;flex-direction:column;align-items:center;z-index:1\">\n      <sc-if value=\"{{ hasName }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ onChangeName }}\" style=\"position:absolute;top:18px;right:40px;background:rgba(255,255,255,.85);border:1.5px solid rgba(14,36,56,.15);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:600;color:#0e2438;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 6px 14px rgba(14,36,56,.12)\">👤 {{ playerName }} <span style=\"color:#ff6a3d;font-size:12px\">✎ trocar<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"display:flex;align-items:center;gap:10px;background:#0e2438;color:#7fe3ee;padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:.16em;box-shadow:0 6px 18px rgba(14,36,56,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#ff6a3d;display:inline-block\"><\u002Fspan>JOGO EDUCACIONAL · GEOMETRIA &amp; TRIGONOMETRIA\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:92px;line-height:.92;letter-spacing:-.02em;color:#0e2438;margin-top:20px;text-align:center;text-shadow:0 4px 0 rgba(255,255,255,.45)\">TRAJETÓRIA<\u002Fh1>\n      <p style=\"font-size:20px;color:#0e2438;opacity:.8;max-width:600px;text-align:center;margin-top:14px;text-wrap:balance;font-weight:500\">Calcule antes de atirar. Um jogo de artilharia onde a matemática é a sua mira — derrube as estruturas resolvendo ângulos, relações métricas e trigonometria.<\u002Fp>\n\n      <!-- bird roster -->\n      <div style=\"display:flex;gap:8px;align-items:flex-end;margin-top:26px\">\n        <sc-for list=\"{{ roster }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <svg width=\"{{ b.size }}\" height=\"{{ b.size }}\" viewBox=\"0 0 100 100\" style=\"filter:drop-shadow(0 6px 8px rgba(14,36,56,.22));animation:floaty {{ b.dur }} ease-in-out infinite\">\n            <path d=\"M22,52 L4,40 L10,52 L4,64 Z\" fill=\"{{ b.brow }}\"><\u002Fpath>\n            <circle cx=\"52\" cy=\"52\" r=\"34\" fill=\"{{ b.body }}\"><\u002Fcircle>\n            <ellipse cx=\"56\" cy=\"70\" rx=\"20\" ry=\"16\" fill=\"{{ b.belly }}\" opacity=\"0.85\"><\u002Fellipse>\n            <circle cx=\"62\" cy=\"44\" r=\"15\" fill=\"#fff\"><\u002Fcircle>\n            <circle cx=\"67\" cy=\"44\" r=\"6\" fill=\"#16161a\"><\u002Fcircle>\n            <circle cx=\"69\" cy=\"41\" r=\"2\" fill=\"#fff\"><\u002Fcircle>\n            <path d=\"M48,30 L72,40\" stroke=\"{{ b.brow }}\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M78,48 L100,54 L78,62 Z\" fill=\"{{ b.beak }}\"><\u002Fpath>\n            <path d=\"M46,20 L50,6 M58,21 L66,9\" stroke=\"{{ b.brow }}\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:34px;width:100%\">\n        <sc-for list=\"{{ phases }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div style=\"background:#ffffff;border-radius:18px;padding:22px;box-shadow:0 16px 34px rgba(14,36,56,.22);display:flex;flex-direction:column;gap:10px;border-top:5px solid;border-color:{{ p.color }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\">\n              <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;color:{{ p.color }}\">{{ p.num }}<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#fff;background:{{ p.color }};padding:5px 9px;border-radius:6px\">{{ p.label }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438;line-height:1.1\">{{ p.title }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#56708a;line-height:1.45;flex:1\">{{ p.desc }}<\u002Fdiv>\n            <div style=\"font-size:11px;font-family:'JetBrains Mono',monospace;color:#8aa0b5;border-top:1px dashed #d6e0ea;padding-top:9px;margin-top:4px\">{{ p.bncc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- difficulty -->\n      <div style=\"width:100%;max-width:760px;margin-top:38px\">\n        <div style=\"display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:13px\">\n          <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;color:#0e2438\">Dificuldade<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n          <sc-for list=\"{{ diffs }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ d.onClick }}\" style=\"text-align:left;background:{{ d.bg }};color:{{ d.fg }};border:2px solid {{ d.bd }};border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;flex-direction:column;gap:4px;box-shadow:0 6px 16px rgba(14,36,56,.10)\">\n              <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px\">{{ d.label }}<\u002Fspan>\n              <span style=\"font-size:11.5px;opacity:.82;line-height:1.35\">{{ d.desc }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- skins / conquistas -->\n      <div style=\"width:100%;max-width:880px;margin-top:30px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:22px 24px;backdrop-filter:blur(6px)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n          <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;color:#0e2438\">Conquistas &amp; Skins<\u002Fspan>\n          <span style=\"font-size:12px;font-weight:700;color:#fff;background:#0e2438;padding:5px 12px;border-radius:100px\">{{ unlockedCount }} / {{ totalSkins }} desbloqueadas<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:11px\">\n          <sc-for list=\"{{ skinGallery }}\" as=\"sk\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ sk.onClick }}\" style=\"background:{{ sk.cardBg }};border:2.5px solid {{ sk.cardBorder }};border-radius:14px;padding:12px 8px 10px;cursor:{{ sk.cursor }};opacity:{{ sk.op }};display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 5px 13px rgba(14,36,56,.10)\">\n              <svg width=\"48\" height=\"48\" viewBox=\"0 0 100 100\">\n                <path d=\"M22,52 L4,40 L10,52 L4,64 Z\" fill=\"{{ sk.brow }}\"><\u002Fpath>\n                <circle cx=\"52\" cy=\"52\" r=\"34\" fill=\"{{ sk.body }}\"><\u002Fcircle>\n                <ellipse cx=\"56\" cy=\"70\" rx=\"20\" ry=\"16\" fill=\"{{ sk.belly }}\" opacity=\"0.85\"><\u002Fellipse>\n                <circle cx=\"62\" cy=\"44\" r=\"15\" fill=\"#fff\"><\u002Fcircle>\n                <circle cx=\"67\" cy=\"44\" r=\"6\" fill=\"#16161a\"><\u002Fcircle>\n                <path d=\"M48,30 L72,40\" stroke=\"{{ sk.brow }}\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n                <path d=\"M78,48 L100,54 L78,62 Z\" fill=\"{{ sk.beak }}\"><\u002Fpath>\n              <\u002Fsvg>\n              <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:13px;color:#0e2438\">{{ sk.name }}<\u002Fspan>\n              <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;color:#ff6a3d;min-height:12px\">{{ sk.badge }}<\u002Fspan>\n              <span style=\"font-size:10px;color:#7a93a8;line-height:1.25;text-align:center\">{{ sk.reqText }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- progress stats -->\n      <div style=\"display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center\">\n        <div style=\"background:#fff;border-radius:13px;padding:11px 18px;box-shadow:0 8px 18px rgba(14,36,56,.14);display:flex;align-items:center;gap:9px\"><span style=\"font-size:20px\">⭐<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;color:#0e2438\">{{ totalStarsNow }}<\u002Fspan><span style=\"font-size:13px;color:#7a93a8\">/ {{ maxStarsNow }} estrelas<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border-radius:13px;padding:11px 18px;box-shadow:0 8px 18px rgba(14,36,56,.14);display:flex;align-items:center;gap:9px\"><span style=\"font-size:18px\">🎯<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;color:#0e2438\">{{ pointsNow }}<\u002Fspan><span style=\"font-size:13px;color:#7a93a8\">pontos<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border-radius:13px;padding:11px 18px;box-shadow:0 8px 18px rgba(14,36,56,.14);display:flex;align-items:center;gap:9px\"><span style=\"font-size:18px\">🏁<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;color:#0e2438\">{{ solvedCount }}<\u002Fspan><span style=\"font-size:13px;color:#7a93a8\">/ {{ totalLevels }} fases<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:14px;margin-top:24px;flex-wrap:wrap;justify-content:center;align-items:center\">\n        <button onclick=\"{{ onContinue }}\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:21px;color:#fff;background:linear-gradient(180deg,#ff7e52,#ff5a2b);border:none;padding:17px 46px;border-radius:14px;cursor:pointer;box-shadow:0 12px 24px rgba(255,90,43,.45);animation:glow 2.6s infinite\">▶  {{ continueLabel }}<\u002Fbutton>\n        <button onclick=\"{{ onPlay }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#0e2438;background:#ffffff;border:2px solid #0e2438;padding:16px 26px;border-radius:14px;cursor:pointer;box-shadow:0 8px 18px rgba(14,36,56,.12)\">Mapa de Fases<\u002Fbutton>\n        <button onclick=\"{{ onGuide }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#0e2438;background:#ffffff;border:2px solid #0e2438;padding:16px 26px;border-radius:14px;cursor:pointer;box-shadow:0 8px 18px rgba(14,36,56,.12)\">Guia do Professor<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;margin-top:16px;align-items:center\">\n        <button onclick=\"{{ onReport }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#0e2438;background:#7fe3ee;border:none;padding:10px 20px;border-radius:11px;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 6px 14px rgba(127,227,238,.5)\">📊 Relatório do Aluno<\u002Fbutton>\n        <button onclick=\"{{ onResetProgress }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#56708a;background:transparent;border:none;cursor:pointer;text-decoration:underline;opacity:.8\">Reiniciar progresso<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- welcome / name gate -->\n    <sc-if value=\"{{ showNamePrompt }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;z-index:20;background:rgba(8,20,34,.62);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:24px\">\n        <div style=\"background:#fff;border-radius:22px;padding:34px 34px 30px;max-width:440px;width:100%;box-shadow:0 24px 60px rgba(8,20,34,.4);text-align:center;animation:pop .4s ease\">\n          <div style=\"font-size:46px;line-height:1\">🎯<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;color:#0e2438;margin-top:10px\">Bem-vindo(a) ao Trajetória!<\u002Fh2>\n          <p style=\"font-size:15px;color:#56708a;margin-top:8px;line-height:1.5\">Digite seu <b>nome completo<\u002Fb> e escolha sua <b>turma<\u002Fb> para começar. Você entra no <b>ranking da sua turma<\u002Fb> e os dados ficam salvos.<\u002Fp>\n          <input type=\"text\" value=\"{{ playerName }}\" oninput=\"{{ onName }}\" onkeydown=\"{{ onNameKey }}\" placeholder=\"Nome e sobrenome\" autofocus=\"true\" style=\"width:100%;border:2px solid #cdd8e2;border-radius:12px;padding:13px 16px;font-size:17px;font-family:'Space Grotesk',sans-serif;color:#0e2438;outline:none;margin-top:20px;text-align:center\">\n          <div style=\"text-align:left;margin-top:14px\">\n            <label style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#6f93b0;display:block;margin-bottom:6px;text-align:center\">SUA TURMA<\u002Flabel>\n            <select value=\"{{ turma }}\" onchange=\"{{ onTurma }}\" style=\"width:100%;border:2px solid #cdd8e2;border-radius:12px;padding:13px 16px;font-size:17px;font-family:'Space Grotesk',sans-serif;font-weight:600;color:#0e2438;outline:none;background:#fff;cursor:pointer;text-align:center;text-align-last:center\">\n              <sc-for list=\"{{ turmaOptions }}\" as=\"tn\" hint-placeholder-count=\"13\">\n                <option value=\"{{ tn }}\">{{ tn }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasNameError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#e0432f;font-weight:600;margin-top:10px\">{{ nameError }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button onclick=\"{{ onCommitName }}\" style=\"width:100%;font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#fff;background:linear-gradient(180deg,#ff7e52,#ff5a2b);border:none;padding:15px;border-radius:13px;cursor:pointer;margin-top:18px;box-shadow:0 10px 22px rgba(255,90,43,.4)\">Começar ▶<\u002Fbutton>\n          <div style=\"font-size:11.5px;color:#9fb3c4;margin-top:13px;line-height:1.4\">🔒 Seus dados ficam salvos apenas neste dispositivo e são preenchidos automaticamente nos próximos acessos.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isLevels }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:absolute;inset:0;overflow:auto;background:radial-gradient(120% 90% at 50% -10%,#dff0ff 0%,#bfe2f5 45%,#9ccbe8 100%)\">\n    <div style=\"max-width:1000px;margin:0 auto;padding:34px 32px 70px\">\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap\">\n        <button onclick=\"{{ onMenu }}\" style=\"background:#0e2438;color:#fff;border:none;width:42px;height:42px;border-radius:11px;font-size:20px;cursor:pointer\">‹<\u002Fbutton>\n        <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:38px;color:#0e2438\">Mapa de Fases<\u002Fh1>\n        <div style=\"margin-left:auto;display:flex;gap:10px\">\n          <span style=\"background:#fff;border-radius:11px;padding:9px 15px;font-weight:700;color:#0e2438;display:flex;gap:7px;align-items:center;box-shadow:0 6px 14px rgba(14,36,56,.12)\">⭐ {{ totalStarsNow }}/{{ maxStarsNow }}<\u002Fspan>\n          <span style=\"background:#fff;border-radius:11px;padding:9px 15px;font-weight:700;color:#0e2438;display:flex;gap:7px;align-items:center;box-shadow:0 6px 14px rgba(14,36,56,.12)\">🎯 {{ pointsNow }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:15px;color:#3a566f;margin-top:8px;max-width:620px;line-height:1.5\">Dificuldade crescente. Conclua uma fase para liberar a próxima. Acerte de <b>primeira<\u002Fb> para ganhar 3 estrelas e manter o combo.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:26px;margin-top:26px\">\n        <sc-for list=\"{{ phaseGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:13px\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;letter-spacing:.12em;color:#fff;background:{{ g.color }};padding:5px 11px;border-radius:7px\">{{ g.label }}<\u002Fspan>\n              <span style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;color:#0e2438\">{{ g.title }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n              <sc-for list=\"{{ g.cards }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ c.onClick }}\" style=\"position:relative;text-align:left;background:{{ c.cardBg }};border:2.5px solid {{ c.border }};border-radius:16px;padding:15px 15px 13px;cursor:{{ c.cursor }};opacity:{{ c.op }};display:flex;flex-direction:column;gap:8px;box-shadow:0 9px 20px rgba(14,36,56,.12)\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                    <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:{{ c.color }};white-space:nowrap\">{{ c.num }}<\u002Fspan>\n                    <span style=\"font-size:19px\">{{ c.biome }}{{ c.lockIcon }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:14.5px;color:#0e2438;line-height:1.12;min-height:34px\">{{ c.title }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:3px;font-size:17px;line-height:1\"><span style=\"color:{{ c.star1 }}\">★<\u002Fspan><span style=\"color:{{ c.star2 }}\">★<\u002Fspan><span style=\"color:{{ c.star3 }}\">★<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;border-top:1px dashed #d6e0ea;padding-top:7px\">\n                    <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:{{ c.color }}\">{{ c.descCode }}<\u002Fspan>\n                    <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#9fb3c4;letter-spacing:.05em\">{{ c.rankPips }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ======================= GAME ======================= -->\n  <sc-if value=\"{{ isGame }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;background:#0e2438\">\n    <!-- top bar -->\n    <div style=\"height:58px;flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;background:#0b1a2a;border-bottom:1px solid #1d3a57;color:#dbeefb\">\n      <button onclick=\"{{ onLevels }}\" style=\"background:#15304b;color:#9fc0da;border:none;width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer\">‹<\u002Fbutton>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.12em;color:#7fe3ee\">{{ phaseLabel }}<\u002Fdiv>\n      <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;color:#fff\">{{ levelTitle }}<\u002Fdiv>\n      <div style=\"display:flex;gap:2px;margin-left:6px;font-size:16px;line-height:1\"><span style=\"color:{{ lvStar1 }}\">★<\u002Fspan><span style=\"color:{{ lvStar2 }}\">★<\u002Fspan><span style=\"color:{{ lvStar3 }}\">★<\u002Fspan><\u002Fdiv>\n      <sc-if value=\"{{ showCombo }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;color:#0e2438;background:linear-gradient(180deg,#ffd76a,#ffb02e);padding:4px 11px;border-radius:100px;animation:pop .4s ease\">🔥 combo ×{{ comboNow }}<\u002Fspan>\n      <\u002Fsc-if>\n      <div style=\"margin-left:auto;display:flex;align-items:center;gap:11px\">\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#0e2438;background:#7fe3ee;padding:5px 11px;border-radius:100px\">{{ diffLabel }}<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#9fc0da;display:flex;align-items:center;gap:5px\">🐦 {{ skinName }}<\u002Fspan>\n        <span style=\"font-weight:700;font-size:15px;color:#ffd05c;display:flex;align-items:center;gap:6px\">🎯 {{ pointsNow }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- main -->\n    <div style=\"flex:1;display:flex;min-height:0\">\n      <!-- game world -->\n      <div style=\"flex:1;position:relative;min-width:0;background:#bfe8fb\">\n        <canvas id=\"traj-canvas\" ref=\"{{ canvasRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n        <div style=\"position:absolute;left:18px;bottom:16px;background:rgba(11,26,42,.76);color:#cfe6f5;font-size:12.5px;padding:9px 14px;border-radius:10px;backdrop-filter:blur(4px);max-width:340px;line-height:1.45\">Calcule no painel → <b style=\"color:#7fe3ee\">estique o estilingue<\u002Fb> até o marcador atingir sua resposta e <b style=\"color:#ff8a63\">solte<\u002Fb>. (Ou digite e use <b style=\"color:#ff8a63\">Lançar<\u002Fb>.)<\u002Fdiv>\n\n        <sc-if value=\"{{ showUnlock }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:18px;left:50%;transform:translateX(-50%);pointer-events:none;background:linear-gradient(180deg,#fff6e0,#ffe7b8);border:2px solid #ffce5c;border-radius:14px;padding:12px 22px;display:flex;align-items:center;gap:13px;box-shadow:0 12px 30px rgba(14,36,56,.3);animation:pop .45s ease\">\n            <div style=\"font-size:30px;line-height:1\">🏆<\u002Fdiv>\n            <div><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:16px;color:#0e2438\">Skin desbloqueada: {{ unlockName }}!<\u002Fdiv><div style=\"font-size:12.5px;color:#7a5a1e\">{{ unlockReq }} — escolha no menu inicial.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showHit }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:64px;color:#fff;text-shadow:0 4px 0 #2fa84f,0 10px 24px rgba(0,0,0,.3);animation:pop .4s ease\">ACERTOU! 🎯<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ autoToast }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;bottom:18px;right:18px;pointer-events:none;background:rgba(31,158,96,.95);color:#fff;font-size:13px;font-weight:700;padding:9px 15px;border-radius:10px;box-shadow:0 8px 18px rgba(14,36,56,.3);animation:pop .35s ease\">📤 Resultado enviado ao ranking ({{ playerTurma }})<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showMiss }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:46px;color:#fff;text-shadow:0 3px 0 #c23b48,0 8px 20px rgba(0,0,0,.3);animation:pop .4s ease\">errou — recalcule<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- blueprint HUD -->\n      <aside style=\"width:392px;flex:none;background:#0e2438;border-left:1px solid #1d3a57;display:flex;flex-direction:column;overflow:auto;background-image:linear-gradient(rgba(124,227,238,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(124,227,238,.05) 1px,transparent 1px);background-size:26px 26px\">\n        <div style=\"padding:18px 22px 20px;display:flex;flex-direction:column;gap:14px\">\n\n          <!-- descriptor + wind -->\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#0e2438;background:#7fe3ee;padding:5px 10px;border-radius:7px\">{{ descCode }}<\u002Fspan>\n            <span style=\"font-size:11px;font-weight:600;color:#9fc0da;background:#10293f;padding:5px 10px;border-radius:7px\">{{ descComp }}<\u002Fspan>\n            <sc-if value=\"{{ hasWind }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size:11px;font-weight:700;color:#ffd05c;background:#10293f;padding:5px 10px;border-radius:7px\">💨 {{ windText }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"font-size:19px;line-height:1.55;color:#eaf4fd;font-weight:500\">{{ prompt }}<\u002Fdiv>\n\n          <!-- diagram -->\n          <div style=\"background:#091a2b;border:1px solid #1d3a57;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center;min-height:172px\">{{ diagram }}<\u002Fdiv>\n\n          <!-- given -->\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#6f93b0;margin-bottom:7px\">DADOS<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:5px\">\n              <sc-for list=\"{{ given }}\" as=\"g\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;background:#10293f;border-radius:8px;padding:9px 12px\"><span style=\"font-size:13.5px;color:#a9c4da\">{{ g.label }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#7fe3ee\">{{ g.value }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- formula -->\n          <sc-if value=\"{{ showFormulaFlag }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#10293f;border-left:3px solid #ff6a3d;border-radius:8px;padding:11px 14px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#ffd9c9;line-height:1.5\">{{ formula }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- pull attempts counter -->\n          <div style=\"display:flex;align-items:center;gap:9px;background:#10293f;border:1px solid #1d3a57;border-radius:9px;padding:8px 12px\">\n            <span style=\"font-size:15px\">🎯<\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:600;color:#a9c4da\">Puxões de mira<\u002Fspan>\n            <div style=\"display:flex;gap:5px;margin-left:2px\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:{{ pullDot1 }}\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:{{ pullDot2 }}\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:{{ pullDot3 }}\"><\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;color:#7fe3ee\">{{ pullsLeft }}/3<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ pullsUsedAll }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px;color:#ffd05c;font-weight:600;line-height:1.45;margin-top:-2px\">✏️ Puxões esgotados — agora resolva o cálculo e digite o valor para disparar.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- input -->\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;color:#6f93b0;margin-bottom:7px\">SUA RESPOSTA<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:stretch\">\n              <div style=\"flex:1;display:flex;align-items:center;background:#fff;border-radius:11px;padding:0 14px;border:2px solid #2b4a6b\">\n                <input type=\"text\" inputmode=\"decimal\" value=\"{{ answerValue }}\" oninput=\"{{ onAnswerInput }}\" onkeydown=\"{{ onKey }}\" placeholder=\"0\" style=\"flex:1;border:none;outline:none;font-size:22px;font-weight:700;color:#0e2438;background:transparent;width:100%\">\n                <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:#7a93a8\">{{ unit }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ notSolved }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ onFire }}\" disabled=\"{{ firingNow }}\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;color:#fff;background:#ff6a3d;border:none;padding:0 24px;border-radius:11px;cursor:pointer;white-space:nowrap;opacity:{{ fireOpacity }}\">Lançar 🚀<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ solvedNow }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ onNext }}\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;color:#0e2438;background:#46c66d;border:none;padding:0 22px;border-radius:11px;cursor:pointer;white-space:nowrap\">Próximo ›<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- feedback -->\n          <sc-if value=\"{{ showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:{{ fbBg }};border:1px solid {{ fbColor }};border-radius:11px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start\">\n              <div style=\"font-size:20px;line-height:1\">{{ fbIcon }}<\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font-weight:700;font-size:14px;color:{{ fbColor }};margin-bottom:3px\">{{ fbTitle }}<\u002Fdiv><div style=\"font-size:13.5px;color:#cfe2f2;line-height:1.5\">{{ fbMsg }}<\u002Fdiv>\n                <sc-if value=\"{{ showGain }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:7px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:14px;color:#ffd05c\">+{{ lastGain }} pontos 🎯<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:auto;padding-top:11px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#5e7d99;border-top:1px dashed #1d3a57;line-height:1.5\">🎓 {{ bncc }}<br><span style=\"color:#46688a\">Descritor {{ descCode }} · {{ descText }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ======================= REPORT ======================= -->\n  <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"report-screen\" style=\"position:absolute;inset:0;overflow:auto;background:#eef3f8;color:#0e2438\">\n    <div style=\"max-width:880px;margin:0 auto;padding:34px 36px 80px\">\n      <div class=\"no-print\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n        <button onclick=\"{{ onMenu }}\" style=\"background:#0e2438;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer\">‹ Voltar<\u002Fbutton>\n        <button onclick=\"{{ onPrintReport }}\" style=\"margin-left:auto;background:#ff6a3d;color:#fff;border:none;padding:11px 22px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 18px rgba(255,106,61,.35)\">🖨️ Imprimir / Salvar PDF<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- send to spreadsheet -->\n      <div class=\"no-print report-card\" style=\"background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:18px;box-shadow:0 6px 20px rgba(14,36,56,.07);border:1.5px solid #d6eef2\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <span style=\"font-size:20px\">📤<\u002Fspan>\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438\">Enviar resultado para a planilha<\u002Fh2>\n          <button onclick=\"{{ onToggleConfig }}\" style=\"margin-left:auto;background:#eef3f8;color:#56708a;border:none;padding:7px 13px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer\">⚙️ Configurar<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.4fr 1fr auto;gap:12px;align-items:end\">\n          <div>\n            <label style=\"font-size:11px;font-weight:700;letter-spacing:.08em;color:#6f93b0;display:block;margin-bottom:5px\">NOME DO ALUNO<\u002Flabel>\n            <input type=\"text\" value=\"{{ studentName }}\" oninput=\"{{ onName }}\" placeholder=\"Nome e sobrenome\" style=\"width:100%;border:2px solid #cdd8e2;border-radius:10px;padding:10px 13px;font-size:15px;font-family:'Space Grotesk',sans-serif;color:#0e2438;outline:none\">\n            <div style=\"font-size:11.5px;color:#e0791f;font-weight:600;margin-top:5px\">⚠️ Use o nome completo (nome e sobrenome).<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:11px;font-weight:700;letter-spacing:.08em;color:#6f93b0;display:block;margin-bottom:5px\">TURMA<\u002Flabel>\n            <select value=\"{{ turma }}\" onchange=\"{{ onTurma }}\" style=\"width:100%;border:2px solid #cdd8e2;border-radius:10px;padding:10px 13px;font-size:15px;font-family:'Space Grotesk',sans-serif;color:#0e2438;outline:none;background:#fff;cursor:pointer\">\n              <sc-for list=\"{{ turmaOptions }}\" as=\"tn\" hint-placeholder-count=\"9\">\n                <option value=\"{{ tn }}\">{{ tn }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <button onclick=\"{{ onSendData }}\" style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:#fff;background:linear-gradient(180deg,#2bb673,#1f9e60);border:none;padding:11px 22px;border-radius:11px;cursor:pointer;white-space:nowrap;box-shadow:0 8px 16px rgba(31,158,96,.32)\">Enviar ✓<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showConfig }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;padding-top:14px;border-top:1px dashed #d6e0ea\">\n            <label style=\"font-size:11px;font-weight:700;letter-spacing:.08em;color:#6f93b0;display:block;margin-bottom:5px\">URL DO APP DA WEB (GOOGLE APPS SCRIPT)<\u002Flabel>\n            <input type=\"text\" value=\"{{ scriptUrl }}\" oninput=\"{{ onScriptUrl }}\" placeholder=\"https://script.google.com/macros/s/.../exec\" style=\"width:100%;border:2px solid #cdd8e2;border-radius:10px;padding:10px 13px;font-size:13px;font-family:'JetBrains Mono',monospace;color:#0e2438;outline:none\">\n            <p style=\"font-size:12px;color:#8aa0b5;margin-top:8px;line-height:1.5\">Cole aqui a URL do app da Web publicado pelo Apps Script (ver instruções entregues no chat). Os dados de cada aluno vão para a aba com o nome da turma selecionada.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasSendStatus }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:12px;background:{{ sendBg }};border:1px solid {{ sendColor }};border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;color:{{ sendColor }}\">{{ sendMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- header -->\n      <div class=\"report-card\" style=\"background:#0e2438;border-radius:18px;padding:26px 30px;color:#dbeefb;display:flex;align-items:center;gap:24px;flex-wrap:wrap\">\n        <div style=\"flex:1;min-width:240px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.16em;color:#7fe3ee\">RELATÓRIO DE DESEMPENHO<\u002Fdiv>\n          <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;color:#fff;margin-top:4px;line-height:1\">Trajetória<\u002Fh1>\n          <div style=\"font-size:14px;color:#9fc0da;margin-top:8px\">Aluno(a): ______________________________<\u002Fdiv>\n          <div style=\"font-size:13px;color:#7a99b5;margin-top:5px\">Turma: ____________ &nbsp;·&nbsp; Data: {{ reportDate }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n          <div style=\"background:#15304b;border-radius:13px;padding:14px 18px;text-align:center;min-width:92px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;color:#ffd05c\">{{ overallPct }}%<\u002Fdiv><div style=\"font-size:11px;color:#9fc0da;letter-spacing:.06em\">APROVEITAMENTO<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#15304b;border-radius:13px;padding:14px 18px;text-align:center;min-width:92px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;color:#7fe3ee\">{{ reportStars }}<span style=\"font-size:16px;color:#5e7d99\">/{{ reportMaxStars }}<\u002Fspan><\u002Fdiv><div style=\"font-size:11px;color:#9fc0da;letter-spacing:.06em\">⭐ ESTRELAS<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#15304b;border-radius:13px;padding:14px 18px;text-align:center;min-width:92px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;color:#46c66d\">{{ reportPoints }}<\u002Fdiv><div style=\"font-size:11px;color:#9fc0da;letter-spacing:.06em\">🎯 PONTOS<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- descriptor mastery -->\n      <div class=\"report-card\" style=\"background:#fff;border-radius:16px;padding:24px 26px;margin-top:18px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n        <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:21px;color:#0e2438;margin-bottom:4px\">Domínio por descritor<\u002Fh2>\n        <p style=\"font-size:13.5px;color:#56708a;margin-bottom:16px\">Cada descritor agrega os níveis que avaliam aquela habilidade. A % vem das estrelas obtidas (3★ = domínio pleno).<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <sc-for list=\"{{ descReport }}\" as=\"d\" hint-placeholder-count=\"9\">\n            <div style=\"display:flex;align-items:center;gap:14px\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:{{ d.compColor }};min-width:42px\">{{ d.code }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px\">\n                  <span style=\"font-size:13px;color:#33485c;line-height:1.3\">{{ d.text }}<\u002Fspan>\n                  <span style=\"font-size:12px;font-weight:700;color:{{ d.color }};white-space:nowrap\">{{ d.level }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:9px;background:#eef2f6;border-radius:6px;overflow:hidden\"><div style=\"height:100%;width:{{ d.barW }};background:{{ d.color }};border-radius:6px\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#5e7790;min-width:64px;text-align:right\">{{ d.stars }}/{{ d.maxStars }}★<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- per phase + review -->\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:18px\">\n        <div class=\"report-card\" style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438;margin-bottom:14px\">Por fase<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <sc-for list=\"{{ phaseReport }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px\"><span style=\"font-weight:600;color:#0e2438\">{{ p.label }} — {{ p.title }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#5e7790\">{{ p.solved }}/{{ p.total }} · {{ p.pct }}%<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px;background:#eef2f6;border-radius:5px;overflow:hidden\"><div style=\"height:100%;width:{{ p.barW }};background:{{ p.color }};border-radius:5px\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"report-card\" style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438;margin-bottom:12px\">Foco de revisão<\u002Fh2>\n          <sc-if value=\"{{ hasReview }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ reviewList }}\" as=\"r\" hint-placeholder-count=\"2\">\n                <div style=\"background:#fff3ef;border-left:3px solid #e0432f;border-radius:9px;padding:10px 12px\"><div style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:#e0432f\">{{ r.code }} · {{ r.compTag }}<\u002Fdiv><div style=\"font-size:12.5px;color:#33485c;line-height:1.4;margin-top:3px\">{{ r.text }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noReview }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#eefaf0;border-left:3px solid #2fa84f;border-radius:9px;padding:12px 14px;font-size:13px;color:#1f5a32;line-height:1.45\">Nenhum descritor em estado crítico. Continue jogando para consolidar o domínio pleno em todas as habilidades. 🎉<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- level detail table -->\n      <div class=\"report-card\" style=\"background:#fff;border-radius:16px;padding:22px 24px;margin-top:18px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n        <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438;margin-bottom:14px\">Detalhe por nível<\u002Fh2>\n        <div style=\"border:1px solid #e3ebf2;border-radius:11px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:54px 1fr 70px 96px 92px;background:#0e2438;color:#cfe2f2;font-size:11px;font-weight:700;letter-spacing:.05em\">\n            <div style=\"padding:9px 11px\">NÍVEL<\u002Fdiv><div style=\"padding:9px 11px\">DESAFIO<\u002Fdiv><div style=\"padding:9px 8px\">DESCR.<\u002Fdiv><div style=\"padding:9px 8px\">ESTRELAS<\u002Fdiv><div style=\"padding:9px 8px\">STATUS<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ reportRows }}\" as=\"r\" hint-placeholder-count=\"15\">\n            <div style=\"display:grid;grid-template-columns:54px 1fr 70px 96px 92px;font-size:12.5px;color:#33485c;background:{{ r.bg }};border-top:1px solid #eef2f6;align-items:center\">\n              <div style=\"padding:8px 11px;font-family:'JetBrains Mono',monospace;font-weight:700;color:{{ r.color }}\">{{ r.id }}<\u002Fdiv>\n              <div style=\"padding:8px 11px\">{{ r.title }}<\u002Fdiv>\n              <div style=\"padding:8px 8px;font-family:'JetBrains Mono',monospace;font-weight:700;color:{{ r.color }}\">{{ r.descCode }}<\u002Fdiv>\n              <div style=\"padding:8px 8px;font-size:13px\"><span style=\"color:{{ r.s1 }}\">★<\u002Fspan><span style=\"color:{{ r.s2 }}\">★<\u002Fspan><span style=\"color:{{ r.s3 }}\">★<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:8px 8px;font-weight:700;color:{{ r.statusColor }}\">{{ r.statusText }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-size:12px;color:#8aa0b5;margin-top:13px;line-height:1.5\">Critério de estrelas: <b>3★<\u002Fb> acerto na 1ª tentativa (domínio) · <b>2★<\u002Fb> até a 2ª · <b>1★<\u002Fb> após revisão. Níveis “Pendentes” ainda não foram concluídos.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ======================= GUIDE ======================= -->\n  <sc-if value=\"{{ isGuide }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:absolute;inset:0;overflow:auto;background:#f3f6f9;color:#0e2438\">\n    <div id=\"guide-body\" style=\"max-width:880px;margin:0 auto;padding:48px 40px 80px\">\n      <button onclick=\"{{ onMenu }}\" style=\"background:#0e2438;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:24px\">‹ Voltar ao jogo<\u002Fbutton>\n      <div style=\"font-size:13px;color:#6f93b0;font-weight:700;letter-spacing:.14em\">DOCUMENTO DE DESIGN DE JOGO · GDD<\u002Fdiv>\n      <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:48px;color:#0e2438;margin-top:6px\">Trajetória — Guia do Professor<\u002Fh1>\n      <p style=\"font-size:17px;color:#56708a;margin-top:8px;max-width:660px;line-height:1.55\">Jogo de artilharia no estilo <i>Angry Birds<\u002Fi> em que a matemática é a mira. O aluno calcula ângulos, relações métricas e razões trigonométricas <b>antes<\u002Fb> de cada disparo. Este guia reúne a mecânica, as fases, o design para Canva, o sistema de feedback, a oficina física e o alinhamento à BNCC.<\u002Fp>\n\n      <!-- helper: section blocks come from data -->\n      <div style=\"display:flex;flex-direction:column;gap:22px;margin-top:38px\">\n\n        <!-- 1. Visão geral -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">01<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Visão geral<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#33485c\">O jogador comanda um canhão e precisa derrubar estruturas (torres de blocos e triângulos) onde se escondem os alvos. Diferente do <i>Angry Birds<\u002Fi> original, <b>não se arrasta a tela<\u002Fb>: cada lançamento exige resolver um problema matemático cujo resultado calibra o disparo. Acertar o cálculo = acertar o alvo. Errar gera uma trajetória desviada e um feedback que aponta a parte da fórmula a revisar.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px\">\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:14px\"><div style=\"font-size:12px;font-weight:700;color:#6f93b0;letter-spacing:.1em\">PÚBLICO<\u002Fdiv><div style=\"font-size:15px;color:#0e2438;margin-top:4px;font-weight:600\">Ensino Médio (e 9º ano)<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:14px\"><div style=\"font-size:12px;font-weight:700;color:#6f93b0;letter-spacing:.1em\">OBJETIVO<\u002Fdiv><div style=\"font-size:15px;color:#0e2438;margin-top:4px;font-weight:600\">Aplicar geometria e trigonometria<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:14px\"><div style=\"font-size:12px;font-weight:700;color:#6f93b0;letter-spacing:.1em\">SESSÃO<\u002Fdiv><div style=\"font-size:15px;color:#0e2438;margin-top:4px;font-weight:600\">15 níveis · 4 fases<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 2. Mecânica de lançamento -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">02<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Mecânica de lançamento<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#33485c\">A interface do canhão substitui o gesto de arrastar por um <b>painel de cálculo<\u002Fb> (lateral direita, estética de planta técnica / <i>blueprint<\u002Fi>):<\u002Fp>\n          <ol style=\"margin:14px 0 0 20px;padding:0;display:flex;flex-direction:column;gap:9px;font-size:15.5px;line-height:1.55;color:#33485c\">\n            <li><b>Dados<\u002Fb> — o jogo apresenta as medidas conhecidas (ângulos, catetos, hipotenusa).<\u002Fli>\n            <li><b>Fórmula<\u002Fb> — fica visível como apoio, mas o resultado não.<\u002Fli>\n            <li><b>Resposta<\u002Fb> — o aluno digita o valor calculado (ângulo em ° ou distância em m).<\u002Fli>\n            <li><b>Lançar<\u002Fb> — o valor digitado vira o parâmetro real do disparo: o ângulo gira o canhão, a distância define a força/alcance. Só o valor correto produz a parábola que atinge o alvo.<\u002Fli>\n          <\u002Fol>\n          <div style=\"background:#eef6ff;border-left:4px solid #2a9ed6;border-radius:10px;padding:13px 16px;margin-top:16px;font-size:15px;color:#1d4a66;line-height:1.5\"><b>Por que funciona:<\u002Fb> ao tornar a variável matemática o único controle, o erro de cálculo tem consequência visual imediata — o aluno vê a parábola errar e entende que a conta importa.<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 3. Fases -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">03<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">As quatro fases<\u002Fh2><\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:16px\">\n            <div style=\"border:1px solid #e3ebf2;border-radius:13px;padding:18px 20px;border-top:4px solid #ff6a3d\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438\">Fase 1 — Fundamentos e Ângulos<\u002Fdiv>\n              <p style=\"font-size:15px;color:#33485c;line-height:1.55;margin-top:6px\">Níveis introdutórios de calibração da rampa de lançamento. <b>Nível 1-1:<\u002Fb> a rampa forma 35° com o solo e o aluno calcula o <b>ângulo complementar<\u002Fb> (90° − 35° = 55°). <b>Nível 1-2:<\u002Fb> o braço do trabuco está a 130° e o aluno calcula o <b>suplementar<\u002Fb> (180° − 130° = 50°). O diagrama mostra os dois ângulos no vértice.<\u002Fp>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8aa0b5;margin-top:9px\">BNCC: EF07MA23 · EM13MAT308<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:13px;padding:18px 20px;border-top:4px solid #2a9ed6\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438\">Fase 2 — Relações Métricas no Triângulo Retângulo<\u002Fdiv>\n              <p style=\"font-size:15px;color:#33485c;line-height:1.55;margin-top:6px\">O alvo se esconde em uma estrutura triangular e o jogador recebe algumas medidas. <b>Nível 2-1:<\u002Fb> catetos 80 e 60 m → hipotenusa pelo <b>Teorema de Pitágoras<\u002Fb> (a² = b² + c² = 100 m), que calibra a força. <b>Nível 2-2:<\u002Fb> projeções m = 16 e n = 9 → <b>altura relativa à hipotenusa<\u002Fb> (h² = m·n → h = 12 m), o ponto fraco da estrutura. Também explorável: b² = a·m.<\u002Fp>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8aa0b5;margin-top:9px\">BNCC: EF09MA14<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:13px;padding:18px 20px;border-top:4px solid #7b54d6\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438\">Fase 3 — Trigonometria Clássica<\u002Fdiv>\n              <p style=\"font-size:15px;color:#33485c;line-height:1.55;margin-top:6px\">O jogador conhece a hipotenusa (distância direta pelo ar) e o ângulo de lançamento. <b>Nível 3-1:<\u002Fb> hip = 80 m, θ = 60° → distância no solo, o <b>cateto adjacente<\u002Fb> (adj = hip·cosθ = 40 m). <b>Nível 3-2:<\u002Fb> hip = 60 m, θ = 30° → altura do alvo, o <b>cateto oposto<\u002Fb> (op = hip·senθ = 30 m). A tangente aparece como desafio extra (op/adj).<\u002Fp>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8aa0b5;margin-top:9px\">BNCC: EM13MAT308<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:13px;padding:18px 20px;border-top:4px solid #0fa3a3\">\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#0e2438\">Fase 4 — Trigonometria Avançada<\u002Fdiv>\n              <p style=\"font-size:15px;color:#33485c;line-height:1.55;margin-top:6px\"><b>Nível 4-1:<\u002Fb> o canhão gira em <b>radianos<\u002Fb> — converter π/3 rad → 60° lendo o ciclo trigonométrico. <b>Nível 4-2:<\u002Fb> alvo atrás do morro num <b>triângulo qualquer<\u002Fb> → distância pela <b>Lei dos Cossenos<\u002Fb> (a² = b² + c² − 2bc·cos Â = 70 m). <b>Nível 4-3:<\u002Fb> um drone oscila como uma <b>onda<\u002Fb> h(θ) = 20·sen θ + 40 → calcular a altura no instante da mira (50 m) e acertá-lo em movimento.<\u002Fp>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8aa0b5;margin-top:9px\">BNCC: EM13MAT306 · EM13MAT308 · EM13MAT404<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">04<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Design visual &amp; prototipagem no Canva<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#33485c\">Todos os elementos foram pensados como <b>formas geométricas simples<\u002Fb>, fáceis de recriar com os pacotes de vetores 2D do Canva:<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px\">\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:15px\"><div style=\"font-weight:700;color:#0e2438;font-size:15px;margin-bottom:4px\">🐦 Projétil (pássaro)<\u002Fdiv><div style=\"font-size:14px;color:#56708a;line-height:1.5\">Círculo + triângulo (bico) + 2 círculos (olhos). Use a busca “<i>bird cartoon flat<\u002Fi>”.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:15px\"><div style=\"font-weight:700;color:#0e2438;font-size:15px;margin-bottom:4px\">🧱 Estruturas<\u002Fdiv><div style=\"font-size:14px;color:#56708a;line-height:1.5\">Retângulos empilhados (madeira/pedra) e triângulos. Cor sólida + borda mais escura.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:15px\"><div style=\"font-weight:700;color:#0e2438;font-size:15px;margin-bottom:4px\">🎯 Alvo<\u002Fdiv><div style=\"font-size:14px;color:#56708a;line-height:1.5\">Criatura verde: círculo + olhos brancos. Anel pontilhado de mira por cima.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f3f6f9;border-radius:11px;padding:15px\"><div style=\"font-weight:700;color:#0e2438;font-size:15px;margin-bottom:4px\">🏞️ Cenário<\u002Fdiv><div style=\"font-size:14px;color:#56708a;line-height:1.5\">Fundo em degradê azul, colinas em curvas, faixa de grama. Sol = círculo amarelo.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff6ef;border-left:4px solid #ff6a3d;border-radius:10px;padding:13px 16px;margin-top:16px;font-size:15px;color:#7a4422;line-height:1.5\"><b>Dica de prototipagem:<\u002Fb> monte cada tela como um slide no Canva e use a animação entre slides para simular a parábola do disparo antes de programar. Um slide “mira” → um slide “voo” → um slide “impacto”.<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 5. Sistema de feedback -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">05<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Sistema de feedback (anti-frustração)<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#33485c\">Errar não pune — orienta. Ao errar o cálculo, o jogo:<\u002Fp>\n          <ul style=\"margin:12px 0 0 20px;padding:0;display:flex;flex-direction:column;gap:8px;font-size:15.5px;line-height:1.55;color:#33485c\">\n            <li>Mostra a <b>trajetória desviada<\u002Fb> — o aluno vê <i>o quanto<\u002Fi> e <i>para que lado<\u002Fi> errou (curto = força baixa, longo = força alta).<\u002Fli>\n            <li>Exibe uma <b>dica direcionada à fórmula<\u002Fb>: ex. “o cateto oposto usa <b>seno<\u002Fb>, não cosseno”, ou “complementares somam 90°, não 180°”.<\u002Fli>\n            <li>Destaca no diagrama o lado/ângulo procurado, conectando fórmula ↔ figura.<\u002Fli>\n            <li>Permite <b>recalcular sem perder progresso<\u002Fb> — sem “game over”, sem vidas.<\u002Fli>\n          <\u002Ful>\n          <div style=\"background:#eefaf0;border-left:4px solid #46c66d;border-radius:10px;padding:13px 16px;margin-top:16px;font-size:15px;color:#1f5a32;line-height:1.5\">As dicas atacam <b>confusões típicas<\u002Fb>: trocar seno por cosseno, somar em vez de elevar ao quadrado, usar 180° no lugar de 90°. Cada erro vira um momento de ensino.<\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 6. Oficina física -->\n        <section style=\"background:#0e2438;border-radius:16px;padding:26px 28px;color:#dbeefb\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff8a63\">06<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#fff\">Oficina física (extensão em sala)<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.6;color:#bcd4e6\">Adapte a mecânica para o mundo real com <b>papel quadriculado e transferidor<\u002Fb>:<\u002Fp>\n          <ol style=\"margin:12px 0 0 20px;padding:0;display:flex;flex-direction:column;gap:9px;font-size:15.5px;line-height:1.55;color:#bcd4e6\">\n            <li>Cada dupla desenha o canhão na origem do quadriculado e posiciona uma “estrutura-alvo” em coordenadas dadas pelo professor.<\u002Fli>\n            <li>Com transferidor e régua, o aluno mede o ângulo de elevação e calcula catetos/hipotenusa usando as mesmas fórmulas do jogo.<\u002Fli>\n            <li>Traçam a parábola ponto a ponto (tabela x/y) e conferem se a curva “acerta” o alvo.<\u002Fli>\n            <li><b>Competição:<\u002Fb> a dupla cujo cálculo chega mais perto do centro do alvo vence a rodada.<\u002Fli>\n          <\u002Fol>\n          <p style=\"font-size:14px;color:#7fa8c4;margin-top:14px;line-height:1.5\">Materiais: papel quadriculado, transferidor, régua, lápis de cor. Tempo sugerido: 1 aula (50 min).<\u002Fp>\n        <\u002Fsection>\n\n        <!-- 7. BNCC -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">07<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Alinhamento à BNCC<\u002Fh2><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:15px;color:#33485c\">\n            <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#ff6a3d;min-width:104px\">EF07MA23<\u002Fspan><span style=\"line-height:1.5\">Resolver problemas com ângulos complementares e suplementares — Fase 1.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#2a9ed6;min-width:104px\">EF09MA14<\u002Fspan><span style=\"line-height:1.5\">Relações métricas no triângulo retângulo e Teorema de Pitágoras — Fase 2.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#7b54d6;min-width:104px\">EM13MAT308<\u002Fspan><span style=\"line-height:1.5\">Razões trigonométricas (seno, cosseno, tangente) e <b>Lei dos Cossenos<\u002Fb> em triângulos quaisquer — Fases 3 e 4.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#0fa3a3;min-width:104px\">EM13MAT404<\u002Fspan><span style=\"line-height:1.5\">Radianos e ciclo trigonométrico; características das funções seno e cosseno — Fase 4.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#0fa3a3;min-width:104px\">EM13MAT306<\u002Fspan><span style=\"line-height:1.5\">Fenômenos periódicos reais modelados pela função seno — Fase 4 (alvo oscilante).<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#8aa0b5;margin-top:16px;line-height:1.5\">As três habilidades acima desdobram-se nos <b>descritores DG1–DG6<\u002Fb> da seção seguinte, mapeados nível a nível.<\u002Fp>\n        <\u002Fsection>\n\n        <!-- 8. Matriz de avaliação -->\n        <section style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 6px 20px rgba(14,36,56,.07)\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px\"><span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#ff6a3d\">08<\u002Fspan><h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#0e2438\">Matriz de avaliação &amp; descritores<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:15.5px;color:#33485c;line-height:1.55\">Cada nível avalia um <b>descritor<\u002Fb> específico, organizado em duas competências: <b style=\"color:#2a9ed6\">interpretação geométrica<\u002Fb> (ler a figura) e <b style=\"color:#ff6a3d\">modelagem matemática<\u002Fb> (traduzir e resolver). A acerto de primeira (3 estrelas) indica domínio pleno do descritor.<\u002Fp>\n\n          <!-- descriptor cards -->\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px\">\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #2a9ed6\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#2a9ed6\">DG1<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#2a9ed6;letter-spacing:.06em\">INTERPRETAÇÃO<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Reconhecer ângulos complementares, suplementares e opostos pelo vértice em uma figura.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #ff6a3d\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#ff6a3d\">DG2<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#ff6a3d;letter-spacing:.06em\">MODELAGEM<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Calcular a medida de um ângulo desconhecido a partir de relações angulares.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #2a9ed6\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#2a9ed6\">DG3<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#2a9ed6;letter-spacing:.06em\">INTERPRETAÇÃO<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Identificar catetos, hipotenusa e projeções em um triângulo retângulo.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #ff6a3d\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#ff6a3d\">DG4<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#ff6a3d;letter-spacing:.06em\">MODELAGEM<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Aplicar o Teorema de Pitágoras e as relações métricas para obter medidas.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #2a9ed6\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#2a9ed6\">DG5<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#2a9ed6;letter-spacing:.06em\">INTERPRETAÇÃO<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Associar cada razão trigonométrica (sen, cos, tg) ao par de lados correto.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #ff6a3d\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#ff6a3d\">DG6<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#ff6a3d;letter-spacing:.06em\">MODELAGEM<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Resolver problemas de altura e distância aplicando seno, cosseno e tangente.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #ff6a3d\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#ff6a3d\">DG7<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#ff6a3d;letter-spacing:.06em\">MODELAGEM<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Aplicar a <b>Lei dos Cossenos<\u002Fb> para resolver problemas em triângulos não retângulos.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #0fa3a3\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#0fa3a3\">DG8<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#0fa3a3;letter-spacing:.06em\">INTERPRETAÇÃO<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Relacionar graus e <b>radianos<\u002Fb> e localizar ângulos no ciclo trigonométrico.<\u002Fdiv><\u002Fdiv>\n            <div style=\"border:1px solid #e3ebf2;border-radius:12px;padding:15px;border-left:4px solid #0fa3a3\"><div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#0fa3a3\">DG9<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#0fa3a3;letter-spacing:.06em\">MODELAGEM<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;color:#33485c;line-height:1.45\">Modelar fenômenos periódicos com a <b>função seno<\u002Fb> para prever valores no tempo.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- mapping table -->\n          <div style=\"margin-top:22px;border:1px solid #e3ebf2;border-radius:12px;overflow:hidden\">\n            <div style=\"display:grid;grid-template-columns:54px 1.7fr 64px 1.4fr 66px;background:#0e2438;color:#cfe2f2;font-size:11.5px;font-weight:700;letter-spacing:.05em\">\n              <div style=\"padding:10px 12px\">NÍVEL<\u002Fdiv><div style=\"padding:10px 12px\">DESAFIO<\u002Fdiv><div style=\"padding:10px 8px\">DESCR.<\u002Fdiv><div style=\"padding:10px 12px\">HABILIDADE BNCC<\u002Fdiv><div style=\"padding:10px 8px;text-align:center\">NÍVEL<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ matrixRows }}\" as=\"r\" hint-placeholder-count=\"12\">\n              <div style=\"display:grid;grid-template-columns:54px 1.7fr 64px 1.4fr 66px;font-size:13px;color:#33485c;background:{{ r.bg }};border-top:1px solid #eef2f6\">\n                <div style=\"padding:9px 12px;font-family:'JetBrains Mono',monospace;font-weight:700;color:{{ r.color }}\">{{ r.id }}<\u002Fdiv>\n                <div style=\"padding:9px 12px\">{{ r.title }}<\u002Fdiv>\n                <div style=\"padding:9px 8px;font-family:'JetBrains Mono',monospace;font-weight:700;color:{{ r.color }}\">{{ r.descCode }}<\u002Fdiv>\n                <div style=\"padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5e7790\">{{ r.bnccShort }}<\u002Fdiv>\n                <div style=\"padding:9px 8px;text-align:center;font-family:'JetBrains Mono',monospace;color:#9fb3c4;letter-spacing:.04em\">{{ r.rankPips }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"font-size:13px;color:#8aa0b5;margin-top:14px;line-height:1.5\">Sugestão de uso: registre as estrelas de cada aluno por nível — o conjunto de descritores com 1 estrela (acerto após várias tentativas) aponta exatamente quais habilidades revisar. Os níveis de dificuldade (Fácil/Médio/Difícil) controlam a presença da fórmula e a margem de erro, permitindo avaliação diferenciada.<\u002Fp>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;showFormula&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#ff6a3d&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.levels = this.buildLevels();\n    this.skins = this.buildSkins();\n    let solved = [], li = 0, diff='medio', skin='classico', stars={}, points=0;\n    try{ const s = JSON.parse(localStorage.getItem('trajetoria_v1')||'{}');\n      if(Array.isArray(s.solved)) solved=s.solved;\n      if(typeof s.level==='number') li=Math.min(s.level,this.levels.length-1);\n      if(typeof s.difficulty==='string') diff=s.difficulty;\n      if(typeof s.skin==='string') skin=s.skin;\n      if(s.stars && typeof s.stars==='object') stars=s.stars;\n      if(typeof s.points==='number') points=s.points;\n    }catch(e){}\n    if(!this.skinUnlocked(skin, solved)) skin='classico';\n    // teacher/data config (separate key)\n    let cfg={};\n    try{ cfg = JSON.parse(localStorage.getItem('trajetoria_cfg')||'{}'); }catch(e){}\n    this.defaultTurmas = ['9º A','9º B','9º C','9º D','1º A','1º B','1º C','2º A','2º B','2º C','3º A','3º B','3º C'];\n    this.defaultScriptUrl = 'https://script.google.com/macros/s/AKfycbzGBBviU_I8U8F1q-djLTMufw4tcCx3e-3QeT6POBsmo-Z0hVrBK0OxAciAwMHpphxQyA/exec';\n    this.state = { screen:'menu', levelIndex:li, answer:'', status:'aiming', feedback:null, solvedList:solved, difficulty:diff, skin, justUnlocked:null, stars, points, attempts:0, dragsUsed:0, combo:0, lastGain:null,\n      studentName: cfg.studentName||'', turma: cfg.turma||'9º A', s
